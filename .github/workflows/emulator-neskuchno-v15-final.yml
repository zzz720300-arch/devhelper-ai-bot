name: Final V15 emulator verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: neskuchno-v15-emulator-final
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

jobs:
  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - name: Restore and patch source
        shell: bash
        run: |
          set -euo pipefail
          cat ci_payload/neskuchno-v15/source.part00 ci_payload/neskuchno-v15/source.part01 ci_payload/neskuchno-v15/source.part02 ci_payload/neskuchno-v15/source.part03 ci_payload/neskuchno-v15/source.part04a ci_payload/neskuchno-v15/source.part04b ci_payload/neskuchno-v15/source.part05 ci_payload/neskuchno-v15/source.part06 ci_payload/neskuchno-v15/source.part07 | tr -d '\r\n ' | base64 -d > source.tar.xz
          echo 'fbb97de69873202d21ac16955d0babde808302bb39eb304cda3032ea22733080  source.tar.xz' | sha256sum -c -
          mkdir restored && tar -xJf source.tar.xz -C restored
          ROOT="$(find restored -name settings.gradle.kts -printf '%h\n' | head -n1)"
          python3 ci_payload/neskuchno-v15/apply_source_fixes.py "$ROOT"
          echo "PROJECT_ROOT=$ROOT" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install SDK, ATD image and Gradle
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools' 'emulator' 'system-images;android-35;aosp_atd;x86_64'
          curl -fL --retry 5 --retry-all-errors https://services.gradle.org/distributions/gradle-8.13-bin.zip -o "$RUNNER_TEMP/gradle.zip"
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          echo "GRADLE_BIN=$RUNNER_TEMP/gradle-8.13/bin/gradle" >> "$GITHUB_ENV"
      - name: Build tested debug APK
        shell: bash
        run: |
          set -euo pipefail
          export GRADLE_USER_HOME="$RUNNER_TEMP/gradle-home"
          "$GRADLE_BIN" -p "$PROJECT_ROOT" --no-daemon --console=plain testDebugUnitTest lintDebug assembleDebug --stacktrace > emulator-build.log 2>&1
          APK="$(find "$PROJECT_ROOT/app/build/outputs/apk/debug" -type f -name '*.apk' | head -n1)"
          test -s "$APK"
          cp "$APK" NESKUCHNO_V15_DEBUG.apk
          sha256sum NESKUCHNO_V15_DEBUG.apk > NESKUCHNO_V15_DEBUG.sha256
      - name: Boot ATD with deterministic timeout
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd --force --name neskuchno_atd --package 'system-images;android-35;aosp_atd;x86_64'
          nohup emulator -avd neskuchno_atd -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -wipe-data -accel off -no-metrics -memory 1024 > emulator-console.log 2>&1 &
          PID=$!
          echo "$PID" > emulator.pid
          READY=0
          for i in $(seq 1 150); do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo 'Emulator process exited before ADB became ready' >&2
              cat emulator-console.log >&2
              exit 1
            fi
            if adb get-state 2>/dev/null | grep -q device; then READY=1; break; fi
            sleep 2
          done
          test "$READY" = 1
          timeout 600 bash -c 'until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do sleep 5; done'
          adb shell input keyevent 82 || true
          adb devices -l | tee emulator-devices.txt
      - name: Install, launch, navigate and restart
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE=ru.quantai.neskuchno.debug
          ACTIVITY=ru.quantai.neskuchno.MainActivity
          adb install -r NESKUCHNO_V15_DEBUG.apk | tee emulator-install.txt
          adb shell pm grant "$PACKAGE" android.permission.RECORD_AUDIO || true
          adb shell am force-stop "$PACKAGE"
          adb shell am start -W -n "$PACKAGE/$ACTIVITY" | tee emulator-start.txt
          sleep 8
          test -n "$(adb shell pidof "$PACKAGE" | tr -d '\r')"
          adb exec-out screencap -p > emulator-home.png
          adb shell uiautomator dump /sdcard/home.xml >/dev/null
          adb pull /sdcard/home.xml emulator-home.xml >/dev/null
          grep -q 'НЕСКУЧНО' emulator-home.xml
          adb shell input tap 470 890
          sleep 3
          adb exec-out screencap -p > emulator-feature.png
          adb shell uiautomator dump /sdcard/feature.xml >/dev/null
          adb pull /sdcard/feature.xml emulator-feature.xml >/dev/null
          adb logcat -d > emulator-logcat.txt
          if grep -E 'FATAL EXCEPTION|ANR in ru.quantai.neskuchno|Process: ru.quantai.neskuchno' emulator-logcat.txt; then exit 1; fi
          adb shell am force-stop "$PACKAGE"
          adb shell am start -W -n "$PACKAGE/$ACTIVITY" | tee emulator-restart.txt
          sleep 4
          test -n "$(adb shell pidof "$PACKAGE" | tr -d '\r')"
      - name: Package signing tools
        if: always()
        shell: bash
        run: |
          BT="$ANDROID_HOME/build-tools/35.0.0"
          mkdir -p signing-tools/lib
          cp "$BT/apksigner" "$BT/zipalign" signing-tools/ || true
          cp "$BT/lib/apksigner.jar" signing-tools/lib/ || true
          chmod +x signing-tools/apksigner signing-tools/zipalign || true
          tar -czf ANDROID_SIGNING_TOOLS_35.tar.gz signing-tools || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NESKUCHNO_V15_EMULATOR_FINAL
          path: |
            NESKUCHNO_V15_DEBUG.apk
            NESKUCHNO_V15_DEBUG.sha256
            source.tar.xz
            emulator-build.log
            emulator-console.log
            emulator-devices.txt
            emulator-install.txt
            emulator-start.txt
            emulator-restart.txt
            emulator-home.png
            emulator-feature.png
            emulator-home.xml
            emulator-feature.xml
            emulator-logcat.txt
            ANDROID_SIGNING_TOOLS_35.tar.gz
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
