name: Diagnose Neskuchno V15 build
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Restore source
        shell: bash
        run: |
          set -euo pipefail
          cat ci_payload/neskuchno-v15/source.part00 ci_payload/neskuchno-v15/source.part01 ci_payload/neskuchno-v15/source.part02 ci_payload/neskuchno-v15/source.part03 ci_payload/neskuchno-v15/source.part04a ci_payload/neskuchno-v15/source.part04b ci_payload/neskuchno-v15/source.part05 ci_payload/neskuchno-v15/source.part06 ci_payload/neskuchno-v15/source.part07 | tr -d '\r\n ' | base64 -d > source.tar.xz
          echo 'fbb97de69873202d21ac16955d0babde808302bb39eb304cda3032ea22733080  source.tar.xz' | sha256sum -c -
          mkdir restored && tar -xJf source.tar.xz -C restored
          ROOT="$(find restored -name settings.gradle.kts -printf '%h\n' | head -n1)"
          echo "PROJECT_ROOT=$ROOT" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools'
      - name: Wrapper and build diagnostics
        id: build
        continue-on-error: true
        shell: bash
        run: |
          ROOT="$PROJECT_ROOT"
          chmod +x "$ROOT/gradlew"
          sed -i 's/networkTimeout=.*/networkTimeout=60000/' "$ROOT/gradle/wrapper/gradle-wrapper.properties"
          export GRADLE_USER_HOME="$RUNNER_TEMP/gradle-home"
          {
            set -x
            file "$ROOT/gradlew" "$ROOT/gradle/wrapper/gradle-wrapper.jar"
            java -version
            "$ROOT/gradlew" -p "$ROOT" --version
            "$ROOT/gradlew" -p "$ROOT" --no-daemon --console=plain clean testDebugUnitTest lintDebug assembleDebug --stacktrace
          } > build-diagnostic.log 2>&1
          echo $? > build-exit-code.txt
      - name: Print diagnostic tail
        if: always()
        run: tail -n 260 build-diagnostic.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NESKUCHNO_V15_DIAGNOSTIC
          path: |
            source.tar.xz
            build-diagnostic.log
            build-exit-code.txt
            restored/**/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          compression-level: 0
