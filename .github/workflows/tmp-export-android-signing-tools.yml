name: Temporary export Android signing tools

on:
  pull_request:
    branches: [main]

jobs:
  export-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Locate Android build tools
        shell: bash
        run: |
          set -euxo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          if [ ! -d "$SDK/build-tools" ]; then
            echo "Android SDK build-tools not found" >&2
            exit 1
          fi
          VER="$(find "$SDK/build-tools" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -V | tail -1)"
          DIR="$SDK/build-tools/$VER"
          mkdir -p exported-tools
          cp "$DIR/apksigner" exported-tools/apksigner
          cp "$DIR/zipalign" exported-tools/zipalign
          cp "$DIR/lib/apksigner.jar" exported-tools/apksigner.jar
          chmod +x exported-tools/apksigner exported-tools/zipalign
          sha256sum exported-tools/* | tee exported-tools/SHA256SUMS.txt
          file exported-tools/*
      - name: Upload tools
        uses: actions/upload-artifact@v4
        with:
          name: android-signing-tools
          path: exported-tools
          if-no-files-found: error
          retention-days: 1
