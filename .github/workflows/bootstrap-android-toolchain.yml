name: Bootstrap Android Toolchain

on:
  push:
    paths:
      - '.github/workflows/bootstrap-android-toolchain.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  TOOLCHAIN_ARTIFACT: android-toolchain

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Reassemble cached toolchain
        shell: bash
        run: |
          set -euxo pipefail
          cat tools-cache/android-toolchain.part-* > /tmp/android-toolchain.tar.gz
          sha256sum /tmp/android-toolchain.tar.gz
          test "$(sha256sum /tmp/android-toolchain.tar.gz | awk '{print $1}')" = "$(awk '{print $1}' tools-cache/android-toolchain.sha256)"
      - name: Upload toolchain artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: android-toolchain
          path: /tmp/android-toolchain.tar.gz
          compression-level: 0
          retention-days: 1
      - name: Store workflow metadata
        shell: bash
        run: |
          set -euxo pipefail
          printf '%s\n' "$GITHUB_RUN_ID" > tools-cache/latest-run-id.txt
          printf '%s\n' "${{ steps.upload.outputs.artifact-id }}" > tools-cache/latest-artifact-id.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools-cache/latest-run-id.txt tools-cache/latest-artifact-id.txt
          git commit -m "chore: record toolchain artifact [skip ci]"
          git push
