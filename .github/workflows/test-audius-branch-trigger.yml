name: Test Audius branch trigger
on:
  push:
    branches: [demo-audius-1-7-0-20260717]
permissions:
  contents: write
jobs:
  test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: demo-audius-1-7-0-20260717
      - run: |
          mkdir -p build_output_audius_trigger
          date -u > build_output_audius_trigger/triggered.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add build_output_audius_trigger/triggered.txt
          git commit -m "CI trigger proof [skip ci]"
          git push origin HEAD:demo-audius-1-7-0-20260717
