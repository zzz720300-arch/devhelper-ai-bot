name: Package Android SDK for V16 local build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install exact Android packages and Gradle
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools'
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 --max-time 600 https://services.gradle.org/distributions/gradle-8.13-bin.zip -o gradle-8.13-bin.zip
          mkdir android-sdk-v16
          cp -a "$ANDROID_HOME/platforms" android-sdk-v16/
          cp -a "$ANDROID_HOME/build-tools" android-sdk-v16/
          cp -a "$ANDROID_HOME/platform-tools" android-sdk-v16/
          cp -a "$ANDROID_HOME/licenses" android-sdk-v16/
          tar -cJf ANDROID_SDK_V16_BUILD_ENV.tar.xz android-sdk-v16
          sha256sum ANDROID_SDK_V16_BUILD_ENV.tar.xz gradle-8.13-bin.zip > BUILD_ENV_SHA256.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ANDROID_SDK_V16_BUILD_ENV
          path: |
            ANDROID_SDK_V16_BUILD_ENV.tar.xz
            gradle-8.13-bin.zip
            BUILD_ENV_SHA256.txt
          retention-days: 3
          compression-level: 0
