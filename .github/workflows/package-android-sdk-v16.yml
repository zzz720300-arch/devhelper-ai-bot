name: Package Android SDK for V16 local build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: neskuchno-v16-sdk-package
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install and package exact Android build environment
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools'
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 --max-time 600 https://services.gradle.org/distributions/gradle-8.13-bin.zip -o gradle-8.13-bin.zip
          mkdir -p android-sdk-v16/platforms android-sdk-v16/build-tools android-sdk-v16/licenses
          cp -a "$ANDROID_HOME/platforms/android-36" android-sdk-v16/platforms/
          cp -a "$ANDROID_HOME/build-tools/35.0.0" android-sdk-v16/build-tools/
          cp -a "$ANDROID_HOME/platform-tools" android-sdk-v16/
          cp -a "$ANDROID_HOME/licenses/." android-sdk-v16/licenses/
          GZIP=-1 tar -czf ANDROID_SDK_V16_BUILD_ENV.tar.gz android-sdk-v16
          sha256sum ANDROID_SDK_V16_BUILD_ENV.tar.gz gradle-8.13-bin.zip > BUILD_ENV_SHA256.txt
          ls -lh ANDROID_SDK_V16_BUILD_ENV.tar.gz gradle-8.13-bin.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ANDROID_SDK_V16_BUILD_ENV_FAST
          path: |
            ANDROID_SDK_V16_BUILD_ENV.tar.gz
            gradle-8.13-bin.zip
            BUILD_ENV_SHA256.txt
          retention-days: 3
          compression-level: 0
