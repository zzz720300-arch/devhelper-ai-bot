name: Check RouterAI CI secret
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check presence without exposing value
        shell: bash
        env:
          ROUTERAI_TEST_KEY: ${{ secrets.ROUTERAI_TEST_KEY }}
        run: |
          if [ -n "$ROUTERAI_TEST_KEY" ]; then
            echo 'ROUTERAI_TEST_KEY_PRESENT=true'
          else
            echo 'ROUTERAI_TEST_KEY_PRESENT=false'
            exit 2
          fi
