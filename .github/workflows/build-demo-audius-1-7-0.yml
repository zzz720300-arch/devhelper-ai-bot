name: Build Demo Audius 1.7.0

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'build_output_audius/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 1

      - name: Restore 1.5 base and apply Audius patch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build_output_audius demo_rutube_src
          mkdir -p build_output_audius
          cat payload/demo-rutube-source.part.* > demo-rutube-source.b64
          echo '9b57b96e56bd55b78ebfecf39197af53a1318420c6f757576475b51acd34354a  demo-rutube-source.b64' | sha256sum -c -
          base64 -d demo-rutube-source.b64 > demo-rutube-source.tar.gz
          echo '8d770d9584d27409de884d86396f26916699006a9ec79b499d33847c4dfd1ae6  demo-rutube-source.tar.gz' | sha256sum -c -
          tar -xzf demo-rutube-source.tar.gz

          APP=demo_rutube_src/app/src/main
          JAVA=$APP/java/ru/demo/voice
          rm -f "$JAVA/RutubeMusicController.java" "$APP/assets/videos/video_10.mp4"
          cp audius_patch/MainActivity.java "$JAVA/MainActivity.java"
          cp audius_patch/AudiusMusicController.java "$JAVA/AudiusMusicController.java"
          cp audius_patch/PromptManager.java "$JAVA/PromptManager.java"
          cp audius_patch/VideoLooper.java "$JAVA/VideoLooper.java"
          cp audius_patch/AndroidManifest.xml "$APP/AndroidManifest.xml"
          cp audius_patch/app-build.gradle demo_rutube_src/app/build.gradle

          mkdir -p demo_rutube_src/signing
          base64 -d audius_patch/demo-release.keystore.b64 > demo_rutube_src/signing/demo-release.keystore
          echo '3e48e68642a3bd284d52a15b37043eb22a3abc233c34425c733acb759b617a7a  demo_rutube_src/signing/demo-release.keystore' | sha256sum -c -

          for n in $(seq -w 1 9); do test -s "$APP/assets/videos/video_${n}.mp4"; done
          test ! -e "$APP/assets/videos/video_10.mp4"
          test -s "$APP/assets/prompts/default_role_prompt.txt"
          test -s "$APP/assets/config/routerai_key.txt"
          ! grep -Rin --include='*.java' --include='AndroidManifest.xml' 'rutube' "$APP"
          grep -q 'AudiusMusicController' "$JAVA/MainActivity.java"
          grep -q "versionName '1.7.0'" demo_rutube_src/app/build.gradle
          echo RESTORE_OK > build_output_audius/restore-status.txt

      - name: Smoke-test Audius search and stream
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee build_output_audius/audius-smoke.txt
          import json, urllib.parse, urllib.request
          headers = {'User-Agent': 'DemoVoice-CI/1.7', 'Accept': 'application/json'}
          selected = None
          for query in ('house of the rising sun', 'rock cover', 'electronic music'):
              url = 'https://api.audius.co/v1/tracks/search?' + urllib.parse.urlencode({
                  'query': query, 'limit': 20, 'sort_method': 'popular'
              })
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  data = json.load(response).get('data') or []
              for item in data:
                  access = item.get('access') or {}
                  if not item.get('id'):
                      continue
                  if item.get('is_streamable') is False or item.get('is_stream_gated') is True:
                      continue
                  if access.get('stream') is False:
                      continue
                  selected = item
                  break
              if selected:
                  break
          if not selected:
              raise SystemExit('Audius search returned no streamable track')
          track_id = urllib.parse.quote(str(selected['id']), safe='')
          stream = f'https://api.audius.co/v1/tracks/{track_id}/stream?app_name=DemoVoice'
          req = urllib.request.Request(stream, headers={'User-Agent': 'DemoVoice-CI/1.7', 'Range': 'bytes=0-8191'})
          with urllib.request.urlopen(req, timeout=45) as response:
              chunk = response.read(8192)
              final_url = response.geturl()
          if len(chunk) < 1024:
              raise SystemExit(f'Audius stream too short: {len(chunk)} bytes')
          print('Audius track:', selected.get('title'), '-', (selected.get('user') or {}).get('name'))
          print('Stream bytes:', len(chunk), 'final host:', urllib.parse.urlparse(final_url).netloc)
          PY

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - uses: android-actions/setup-android@v3

      - name: Build and verify release APK
        id: apkbuild
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
            gradle -p demo_rutube_src clean :app:assembleRelease --stacktrace
            cp demo_rutube_src/app/build/outputs/apk/release/app-release.apk Demo_Voice_1.7.0.apk
            unzip -t Demo_Voice_1.7.0.apk
            "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging Demo_Voice_1.7.0.apk > badging.txt
            grep -q "package: name='ru.demo.voice'" badging.txt
            grep -q "versionName='1.7.0'" badging.txt
            grep -q "application-label:'Демо'" badging.txt
            unzip -l Demo_Voice_1.7.0.apk > contents.txt
            for n in $(seq -w 1 9); do grep -q "assets/videos/video_${n}.mp4" contents.txt; done
            ! grep -q 'assets/videos/video_10.mp4' contents.txt
            grep -q 'assets/prompts/default_role_prompt.txt' contents.txt
            grep -q 'assets/config/routerai_key.txt' contents.txt
            "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs Demo_Voice_1.7.0.apk > certs.txt
            tr -d ': ' < certs.txt | tr '[:upper:]' '[:lower:]' > certs-normalized.txt
            grep -q '95aef43896f26f257bd616ed9d1c78fe7d01edbeceb5bba6858d5055be1acbbf' certs-normalized.txt
            sha256sum Demo_Voice_1.7.0.apk > Demo_Voice_1.7.0.sha256
          } > build_output_audius/build.log 2>&1
          status=$?
          echo "$status" > build_output_audius/build-exit-code.txt
          if [ "$status" -eq 0 ]; then
            cp Demo_Voice_1.7.0.sha256 badging.txt contents.txt certs.txt build_output_audius/
            base64 -w0 Demo_Voice_1.7.0.apk > build_output_audius/Demo_Voice_1.7.0.apk.b64
            split -b 800000 -d -a 2 build_output_audius/Demo_Voice_1.7.0.apk.b64 build_output_audius/Demo_Voice_1.7.0.apk.b64.part.
            rm build_output_audius/Demo_Voice_1.7.0.apk.b64
            echo SUCCESS > build_output_audius/STATUS.txt
          else
            echo FAILURE > build_output_audius/STATUS.txt
          fi
          exit "$status"

      - name: Publish CI result to build branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f build_output_audius
          git commit -m "CI result: Demo Audius 1.7.0 [skip ci]" || true
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Fail job when APK build failed
        if: steps.apkbuild.outcome == 'failure'
        run: exit 1
