name: Diagnose AI Image Finisher Payload

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every payload chunk and reconstruct archive
        shell: bash
        run: |
          set -euo pipefail
          wc -c \
            ai_image_finisher_ci/source.00.txt \
            ai_image_finisher_ci/source.01.txt \
            ai_image_finisher_ci/source.02.txt \
            ai_image_finisher_ci/source.03part0.txt \
            ai_image_finisher_ci/source.03part1.txt \
            ai_image_finisher_ci/source.04.txt
          sha256sum \
            ai_image_finisher_ci/source.00.txt \
            ai_image_finisher_ci/source.01.txt \
            ai_image_finisher_ci/source.02.txt \
            ai_image_finisher_ci/source.03part0.txt \
            ai_image_finisher_ci/source.03part1.txt \
            ai_image_finisher_ci/source.04.txt
          python3 - <<'PY'
          import base64, hashlib, pathlib
          names = [
              'source.00.txt', 'source.01.txt', 'source.02.txt',
              'source.03part0.txt', 'source.03part1.txt', 'source.04.txt'
          ]
          root = pathlib.Path('ai_image_finisher_ci')
          expected = {
              'source.00.txt': '5d87634bf59d06486ed25de1ca395bd9f1292e7e90cd0f251c97aed67df9d2bd',
              'source.01.txt': '413b02132c086917d98b9378b110464f1d50981072718759b97a8923872eaa64',
              'source.02.txt': '2da589fbbd2e939001dd08a879f455ac8d6c0c34a6bd8a2eab3391c256545248',
              'source.03part0.txt': 'df2b21d2e7dc40236eed9ce97d61b8997ccd3b7e14e7cff85e71ff758bc52870',
              'source.03part1.txt': '84ad0320c17cceb8cb0ff9a1bc1ec1c7baa4926eb4b8b1662730f65e35f15e8a',
              'source.04.txt': '8c8473b9eceeca46fd9f5e5122e0e5543ed41beb53f4b30fc5d75980f029bc03',
          }
          pieces = []
          for name in names:
              raw = (root / name).read_bytes()
              digest = hashlib.sha256(raw).hexdigest()
              print(name, len(raw), digest, 'expected', expected[name])
              if digest != expected[name]:
                  print('MISMATCH', name)
              pieces.append(raw.replace(b'\r', b'').replace(b'\n', b''))
          encoded = b''.join(pieces)
          decoded = base64.b64decode(encoded, validate=True)
          pathlib.Path('source.tar.gz').write_bytes(decoded)
          print('archive bytes', len(decoded))
          print('archive sha256', hashlib.sha256(decoded).hexdigest())
          assert hashlib.sha256(decoded).hexdigest() == 'bf7fdcbba79619689caa4e589279793878e3804f52fa0f5b2552290723a87e8a'
          PY
          gzip -t source.tar.gz
          tar -tzf source.tar.gz | head -30
