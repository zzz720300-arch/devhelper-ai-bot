name: Build and verify Neskuchno V15 APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore and verify clean source
        shell: bash
        run: |
          set -euo pipefail
          cat ci_payload/neskuchno-v15/source.part* | tr -d '\r\n ' | base64 -d > source.tar.xz
          echo 'fbb97de69873202d21ac16955d0babde808302bb39eb304cda3032ea22733080  source.tar.xz' | sha256sum -c -
          xz -t source.tar.xz
          mkdir -p restored
          tar -xJf source.tar.xz -C restored
          ROOT="$(find restored -type f \( -name settings.gradle -o -name settings.gradle.kts \) -printf '%h\n' | head -n1)"
          test -n "$ROOT"
          echo "PROJECT_ROOT=$ROOT" >> "$GITHUB_ENV"
          echo "Project root: $ROOT"
          find "$ROOT" -maxdepth 3 -type f | sort | sed -n '1,180p'

      - name: Audit architecture and integrations
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PROJECT_ROOT"
          MAIN="$ROOT/app/src/main"
          ! grep -RIn --include='*.java' --include='*.kt' -E 'RecognizerIntent|android\.speech\.SpeechRecognizer|ACTION_RECOGNIZE_SPEECH' "$MAIN"
          ! grep -RIn --include='*.java' --include='*.kt' --include='*.gradle' --include='*.gradle.kts' -E 'DnsOverHttps|dnsoverhttps|ResilientDns' "$ROOT"
          grep -RIn --include='*.java' --include='*.kt' 'AudioRecord' "$MAIN"
          grep -RIn --include='*.java' --include='*.kt' -E 'chat/completions|audio/speech|audio/transcriptions' "$MAIN"
          grep -RIn --include='*.java' --include='*.kt' 'qwen/qwen3.5-flash-02-23' "$MAIN"
          grep -RIn --include='*.java' --include='*.kt' 'x-ai/grok-voice-tts-1.0' "$MAIN"
          grep -RIn --include='*.java' --include='*.kt' 'openai/whisper-1' "$MAIN"
          grep -RIn 'ROUTERAI_KEY_PLACEHOLDER' "$MAIN/assets/config/routerai_key.txt"
          test "$(python3 - <<'PY'
          import json, os
          p=os.path.join(os.environ['PROJECT_ROOT'],'app/src/main/assets/stories/stories.json')
          data=json.load(open(p,encoding='utf-8'))
          print(len(data))
          PY
          )" -ge 12

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools'

      - name: Compile, test, lint and build both variants
        id: gradlebuild
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PROJECT_ROOT"
          chmod +x "$ROOT/gradlew"
          "$ROOT/gradlew" -p "$ROOT" --no-daemon --console=plain clean testDebugUnitTest lintDebug lintRelease assembleDebug assembleRelease --stacktrace | tee build.log
          DEBUG_APK="$(find "$ROOT/app/build/outputs/apk/debug" -name '*.apk' -type f | head -n1)"
          RELEASE_APK="$(find "$ROOT/app/build/outputs/apk/release" -name '*.apk' -type f | head -n1)"
          test -s "$DEBUG_APK"
          test -s "$RELEASE_APK"
          cp "$DEBUG_APK" NESKUCHNO_V15_DEBUG.apk
          cp "$RELEASE_APK" NESKUCHNO_V15_RELEASE_UNSIGNED.apk
          sha256sum NESKUCHNO_V15_DEBUG.apk NESKUCHNO_V15_RELEASE_UNSIGNED.apk > APK_SHA256.txt
          find "$ROOT/app/build/reports/tests" -type f -maxdepth 5 | sort > test-report-files.txt
          find "$ROOT/app/build/reports" -iname '*lint*' -type f | sort > lint-report-files.txt

      - name: Verify APK metadata, permissions, archive and signature
        shell: bash
        run: |
          set -euo pipefail
          BT="$ANDROID_HOME/build-tools/35.0.0"
          "$BT/aapt" dump badging NESKUCHNO_V15_DEBUG.apk > debug-badging.txt
          "$BT/aapt" dump permissions NESKUCHNO_V15_DEBUG.apk > debug-permissions.txt
          "$BT/apksigner" verify --verbose --print-certs NESKUCHNO_V15_DEBUG.apk > debug-signature.txt
          unzip -t NESKUCHNO_V15_DEBUG.apk > debug-zip-test.txt
          unzip -t NESKUCHNO_V15_RELEASE_UNSIGNED.apk > release-zip-test.txt
          grep -q "package: name='ru.quantai.neskuchno.debug' versionCode='15'" debug-badging.txt
          grep -q "versionName='1.0.0-v15-debug'" debug-badging.txt
          grep -q 'android.permission.INTERNET' debug-permissions.txt
          grep -q 'android.permission.RECORD_AUDIO' debug-permissions.txt
          ! grep -q 'android.permission.CAMERA' debug-permissions.txt
          unzip -p NESKUCHNO_V15_DEBUG.apk assets/config/routerai_key.txt | grep -q 'ROUTERAI_KEY_PLACEHOLDER'
          unzip -p NESKUCHNO_V15_DEBUG.apk classes.dex | strings | grep -q 'qwen/qwen3.5-flash-02-23'
          unzip -p NESKUCHNO_V15_DEBUG.apk classes.dex | strings | grep -q 'x-ai/grok-voice-tts-1.0'
          unzip -p NESKUCHNO_V15_DEBUG.apk classes.dex | strings | grep -q 'openai/whisper-1'

      - name: Emulator launch and navigation smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          profile: Nexus 6
          disable-animations: true
          script: |
            set -euo pipefail
            PACKAGE=ru.quantai.neskuchno.debug
            ACTIVITY=ru.quantai.neskuchno.MainActivity
            adb install -r NESKUCHNO_V15_DEBUG.apk
            adb shell pm grant "$PACKAGE" android.permission.RECORD_AUDIO || true
            adb shell am force-stop "$PACKAGE"
            adb shell am start -W -n "$PACKAGE/$ACTIVITY" | tee emulator-start.txt
            sleep 8
            test -n "$(adb shell pidof "$PACKAGE" | tr -d '\r')"
            adb exec-out screencap -p > emulator-home.png
            adb shell uiautomator dump /sdcard/window.xml >/dev/null
            adb pull /sdcard/window.xml emulator-home.xml >/dev/null
            grep -q 'НЕСКУЧНО' emulator-home.xml
            adb shell input tap 470 890
            sleep 3
            adb exec-out screencap -p > emulator-feature.png
            adb shell uiautomator dump /sdcard/window2.xml >/dev/null
            adb pull /sdcard/window2.xml emulator-feature.xml >/dev/null
            adb logcat -d > emulator-logcat.txt
            if grep -E 'FATAL EXCEPTION|ANR in ru.quantai.neskuchno|Process: ru.quantai.neskuchno' emulator-logcat.txt; then
              exit 1
            fi
            adb shell am force-stop "$PACKAGE"
            adb shell am start -W -n "$PACKAGE/$ACTIVITY" | tee emulator-restart.txt
            sleep 4
            test -n "$(adb shell pidof "$PACKAGE" | tr -d '\r')"

      - name: Package Android signing tools
        shell: bash
        run: |
          set -euo pipefail
          BT="$ANDROID_HOME/build-tools/35.0.0"
          mkdir -p signing-tools/lib
          cp "$BT/apksigner" "$BT/zipalign" signing-tools/
          cp "$BT/lib/apksigner.jar" signing-tools/lib/
          chmod +x signing-tools/apksigner signing-tools/zipalign
          tar -czf ANDROID_SIGNING_TOOLS_35.tar.gz signing-tools
          sha256sum ANDROID_SIGNING_TOOLS_35.tar.gz > ANDROID_SIGNING_TOOLS_35.sha256

      - name: Write build verification report
        if: always()
        shell: bash
        run: |
          {
            echo 'NESKUCHNO V15 CI VERIFICATION'
            echo "commit=$GITHUB_SHA"
            echo "run=$GITHUB_RUN_ID"
            echo "gradle_step=${{ steps.gradlebuild.outcome }}"
            date -u '+utc=%Y-%m-%dT%H:%M:%SZ'
          } > CI_VERIFICATION.txt

      - name: Upload APK and verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NESKUCHNO_V15_CI_BUILD
          path: |
            NESKUCHNO_V15_DEBUG.apk
            NESKUCHNO_V15_RELEASE_UNSIGNED.apk
            APK_SHA256.txt
            source.tar.xz
            build.log
            debug-badging.txt
            debug-permissions.txt
            debug-signature.txt
            debug-zip-test.txt
            release-zip-test.txt
            test-report-files.txt
            lint-report-files.txt
            emulator-start.txt
            emulator-restart.txt
            emulator-home.png
            emulator-feature.png
            emulator-home.xml
            emulator-feature.xml
            emulator-logcat.txt
            ANDROID_SIGNING_TOOLS_35.tar.gz
            ANDROID_SIGNING_TOOLS_35.sha256
            CI_VERIFICATION.txt
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0
