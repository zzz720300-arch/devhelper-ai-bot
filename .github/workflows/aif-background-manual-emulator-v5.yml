name: AI Image Finisher V5 BiRefNet Manual Emulator Diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: aif-engine-gate-v5
  GRADLE_SHA256: 20f1b1176237254a6fc204d8434196fa11a4cfb387567519c61556e8710aed78

jobs:
  birefnet-manual:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Generate deterministic Android project
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$PROJECT_DIR"
          mkdir -p "$PROJECT_DIR"
          for script in aif-v5-bootstrap/bootstrap-*.sh; do bash "$script" "$PROJECT_DIR"; done
          grep -q 'AIF_BG' "$PROJECT_DIR/engine/background-onnx/src/main/java/ru/quantai/imagefinisher/engine/background/BiRefNetBackgroundEngine.kt"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install verified Gradle 8.13
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 5 --retry-all-errors -o "$RUNNER_TEMP/gradle.zip" https://services.gradle.org/distributions/gradle-8.13-bin.zip
          echo "$GRADLE_SHA256  $RUNNER_TEMP/gradle.zip" | sha256sum -c -
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/gradle-8.13/bin" >> "$GITHUB_PATH"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and x86_64 system image
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platforms;android-36' 'build-tools;36.1.0' 'platform-tools' \
            'emulator' 'system-images;android-35;google_apis;x86_64'

      - name: Download verified background engines
        shell: bash
        run: |
          set -euo pipefail
          BG="$PROJECT_DIR/engine/background-onnx/src/main/assets/models"
          SELF="$PROJECT_DIR/engine/background-onnx/src/main/assets/selftest"
          mkdir -p "$BG" "$SELF"
          curl -L --fail --retry 5 --retry-all-errors -o "$BG/birefnet_lite.onnx" 'https://huggingface.co/onnx-community/BiRefNet_lite-ONNX/resolve/main/onnx/model.onnx?download=true'
          echo '5600024376f572a557870a5eb0afb1e5961636bef4e1e22132025467d0f03333  '"$BG"'/birefnet_lite.onnx' | sha256sum -c -
          curl -L --fail --retry 5 --retry-all-errors -o "$BG/u2netp.onnx" 'https://huggingface.co/chwshuang/Stable_diffusion_remove_background_model/resolve/main/u2netp.onnx?download=true'
          echo '16fb536473a41b2e101bd3a6ff788f599b95e32ecbe20624c552b3d8ba91a11a  '"$BG"'/u2netp.onnx' | sha256sum -c -
          python3 -m pip install --quiet --disable-pip-version-check pillow==11.3.0 scikit-image==0.25.2
          python3 - <<'PY'
          from PIL import Image
          from skimage import data
          Image.fromarray(data.astronaut()).convert('RGB').save('aif-engine-gate-v5/engine/background-onnx/src/main/assets/selftest/subject.png')
          PY
          sha256sum "$BG"/* "$SELF"/* > background-manual-assets.sha256

      - name: Build target and instrumentation APKs
        shell: bash
        run: |
          set -euo pipefail
          gradle -p "$PROJECT_DIR" --no-daemon --stacktrace --console=plain \
            :app:assembleDebug :app:assembleDebugAndroidTest \
            2>&1 | tee background-manual-build.log
          find "$PROJECT_DIR/app/build/outputs/apk" -type f -name '*.apk' -ls

      - name: Start Android emulator manually
        shell: bash
        run: |
          set -euo pipefail
          sudo chmod 666 /dev/kvm || true
          echo no | avdmanager create avd --force \
            --name aif_birefnet_diag \
            --package 'system-images;android-35;google_apis;x86_64' \
            --device 'pixel_6'
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd aif_birefnet_diag \
            -no-window -noaudio -no-boot-anim \
            -gpu swiftshader_indirect \
            -memory 6144 -cores 4 -partition-size 4096 \
            > "$GITHUB_WORKSPACE/background-emulator.log" 2>&1 &
          echo $! > "$GITHUB_WORKSPACE/background-emulator.pid"
          adb wait-for-device
          for i in $(seq 1 180); do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            [ "$BOOT" = "1" ] && break
            sleep 2
          done
          test "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1"
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell getprop > background-manual-device-props.txt
          adb shell df -h > background-manual-disk.txt
          adb devices -l

      - name: Install APKs and run only BiRefNet instrumentation
        shell: bash
        run: |
          set +e
          TARGET_APK=$(find "$PROJECT_DIR/app/build/outputs/apk/debug" -name '*debug.apk' ! -name '*androidTest*' -type f | head -1)
          TEST_APK=$(find "$PROJECT_DIR/app/build/outputs/apk/androidTest/debug" -name '*.apk' -type f | head -1)
          echo "TARGET_APK=$TARGET_APK" | tee background-manual-test.log
          echo "TEST_APK=$TEST_APK" | tee -a background-manual-test.log
          adb install -r "$TARGET_APK" 2>&1 | tee -a background-manual-test.log
          INSTALL_TARGET=${PIPESTATUS[0]}
          adb install -r "$TEST_APK" 2>&1 | tee -a background-manual-test.log
          INSTALL_TEST=${PIPESTATUS[0]}
          adb logcat -c
          adb shell am instrument -w -r \
            -e class 'ru.quantai.imagefinisher.app.EngineGateInstrumentedTest#b_backgroundEngineExecutesInsideAndroid' \
            ru.quantai.imagefinisher.app.test/androidx.test.runner.AndroidJUnitRunner \
            2>&1 | tee -a background-manual-test.log
          TEST_CODE=${PIPESTATUS[0]}
          adb logcat -d -v threadtime > background-manual-logcat.txt 2>&1 || true
          adb logcat -b crash -d -v threadtime > background-manual-crash-buffer.txt 2>&1 || true
          adb shell dumpsys activity exit-info ru.quantai.imagefinisher.app > background-manual-exit-info.txt 2>&1 || true
          adb shell dumpsys dropbox --print data_app_native_crash > background-manual-native-crash.txt 2>&1 || true
          adb shell dumpsys dropbox --print SYSTEM_LAST_KMSG > background-manual-last-kmsg.txt 2>&1 || true
          adb shell dumpsys meminfo > background-manual-all-meminfo.txt 2>&1 || true
          printf 'install_target=%s\ninstall_test=%s\ntest_code=%s\n' "$INSTALL_TARGET" "$INSTALL_TEST" "$TEST_CODE" > background-manual-exit-codes.txt
          grep -E 'AIF_BG|AIF_ENGINE_GATE|Fatal signal|FATAL EXCEPTION|lowmemory|lmkd|OutOfMemory|onnxruntime|am_crash|am_kill' background-manual-logcat.txt > background-manual-key-events.txt || true
          if [ "$INSTALL_TARGET" -ne 0 ] || [ "$INSTALL_TEST" -ne 0 ] || ! grep -q 'OK (1 test)' background-manual-test.log; then
            exit 1
          fi

      - name: Stop emulator
        if: always()
        shell: bash
        run: |
          adb emu kill || true
          if [ -f background-emulator.pid ]; then kill "$(cat background-emulator.pid)" || true; fi

      - name: Upload manual BiRefNet evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AI_IMAGE_FINISHER_V5_BIREFNET_MANUAL_EMULATOR_EVIDENCE
          path: |
            background-manual-assets.sha256
            background-manual-build.log
            background-emulator.log
            background-emulator.pid
            background-manual-device-props.txt
            background-manual-disk.txt
            background-manual-test.log
            background-manual-logcat.txt
            background-manual-crash-buffer.txt
            background-manual-exit-info.txt
            background-manual-native-crash.txt
            background-manual-last-kmsg.txt
            background-manual-all-meminfo.txt
            background-manual-exit-codes.txt
            background-manual-key-events.txt
            aif-engine-gate-v5/app/build/reports/androidTests/connected/**
            aif-engine-gate-v5/app/build/outputs/androidTest-results/**
          if-no-files-found: warn
          retention-days: 7
