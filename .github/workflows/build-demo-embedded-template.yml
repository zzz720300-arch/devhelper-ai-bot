name: Build Demo embedded template APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Restore Android project
        shell: bash
        run: |
          set -euo pipefail
          cat payload/demo-embedded-template.part.* | base64 -d > demo-template.tar.gz
          tar -xzf demo-template.tar.gz
          test -f demo_template/app/src/main/java/ru/demo/voice/MainActivity.java
          test -f demo_template/app/src/main/assets/videos/video_03.mp4
          test -f demo_template/app/src/main/assets/config/routerai_key.txt

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - uses: android-actions/setup-android@v3

      - name: Build and verify
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          gradle -p demo_template clean :app:assembleDebug --stacktrace
          cp demo_template/app/build/outputs/apk/debug/app-debug.apk Demo_Embedded_Template_1.4.0.apk
          unzip -t Demo_Embedded_Template_1.4.0.apk
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging Demo_Embedded_Template_1.4.0.apk > badging.txt
          grep -q "package: name='ru.demo.voice'" badging.txt
          grep -q "versionName='1.4.0'" badging.txt
          grep -q "application-label:'Демо'" badging.txt
          unzip -l Demo_Embedded_Template_1.4.0.apk > contents.txt
          grep -q 'assets/videos/video_01.mp4' contents.txt
          grep -q 'assets/videos/video_02.mp4' contents.txt
          grep -q 'assets/videos/video_03.mp4' contents.txt
          grep -q 'assets/prompts/default_role_prompt.txt' contents.txt
          grep -q 'assets/config/routerai_key.txt' contents.txt
          sha256sum Demo_Embedded_Template_1.4.0.apk > Demo_Embedded_Template_1.4.0.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: DEMO_EMBEDDED_TEMPLATE_1_4_0
          path: |
            Demo_Embedded_Template_1.4.0.apk
            Demo_Embedded_Template_1.4.0.sha256
            badging.txt
            contents.txt
          retention-days: 14
