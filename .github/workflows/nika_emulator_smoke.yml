name: NIKA Voice V1 Emulator Smoke

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore complete Android project
        shell: bash
        run: |
          set -euo pipefail
          cat payload/fullsrc.*.txt | base64 -d > nika_full_source.tar.gz
          tar -xzf nika_full_source.tar.gz
          mkdir -p nika_full_project/app/src/main/res/raw
          cat payload/video.*.txt | base64 -d > nika_full_project/app/src/main/res/raw/nika_background.mp4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          gradle -p nika_full_project :app:assembleDebug --stacktrace

      - name: Launch and inspect on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -euo pipefail
            APK=nika_full_project/app/build/outputs/apk/debug/app-debug.apk
            adb install -r "$APK"
            adb shell pm grant ru.nika.voice android.permission.RECORD_AUDIO || true
            adb shell pm grant ru.nika.voice android.permission.CAMERA || true
            adb shell am force-stop ru.nika.voice
            adb shell am start -W -n ru.nika.voice/.MainActivity | tee START_RESULT.txt
            sleep 12
            PID="$(adb shell pidof ru.nika.voice | tr -d '\r')"
            test -n "$PID"
            echo "PID=$PID" | tee PROCESS_RESULT.txt
            adb exec-out screencap -p > NIKA_LAUNCH.png
            adb shell uiautomator dump /sdcard/nika_window.xml || true
            adb pull /sdcard/nika_window.xml NIKA_WINDOW.xml || true
            adb shell input tap 680 65
            sleep 3
            adb exec-out screencap -p > NIKA_TEXT_MODE.png
            adb logcat -d > NIKA_LOGCAT.txt
            if grep -E "FATAL EXCEPTION|ANR in ru.nika.voice|Process: ru.nika.voice" NIKA_LOGCAT.txt; then
              exit 1
            fi
            adb shell am force-stop ru.nika.voice
            adb shell am start -W -n ru.nika.voice/.MainActivity | tee RESTART_RESULT.txt
            sleep 5
            test -n "$(adb shell pidof ru.nika.voice | tr -d '\r')"

      - name: Upload smoke-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NIKA_VOICE_V1_EMULATOR_SMOKE
          path: |
            START_RESULT.txt
            RESTART_RESULT.txt
            PROCESS_RESULT.txt
            NIKA_LAUNCH.png
            NIKA_TEXT_MODE.png
            NIKA_WINDOW.xml
            NIKA_LOGCAT.txt
          if-no-files-found: warn
          retention-days: 30
