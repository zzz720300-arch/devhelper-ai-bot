name: Debug Demo9 assets

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode and list
        shell: bash
        run: |
          set -euo pipefail
          cat payload/demo9-assets.part.* > demo9-assets.b64
          base64 -d demo9-assets.b64 > demo9-assets.tar.gz
          sha256sum demo9-assets.tar.gz
          tar -tzvf demo9-assets.tar.gz | tee demo9-list.txt
          mkdir decoded
          tar -xzf demo9-assets.tar.gz -C decoded
          find decoded -type f -printf '%p %s\n' | sort | tee demo9-files.txt
      - uses: actions/upload-artifact@v4
        with:
          name: DEMO9_ASSETS_DIAGNOSTIC
          path: |
            demo9-assets.tar.gz
            demo9-list.txt
            demo9-files.txt
          retention-days: 3
