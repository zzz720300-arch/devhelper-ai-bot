name: Export DocCenter Android toolchain

on:
  push:
    branches: [doccenter-build-v7-7-28]
  workflow_dispatch:

jobs:
  export-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'