name: Export DocCenter Android toolchain

on:
  push:
    branches: [doccenter-build-v7-7-28]
  workflow_dispatch:

jobs:
  export-toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0' 'platform-tools'

      - name: Warm all Gradle and Maven dependencies
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p warmup/app/src/main/java/com/example/warmup
          cat > warmup/settings.gradle <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'DocCenterWarmup'
          include ':app'
          EOF
          cat > warmup/build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF
          cat > warmup/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          cat > warmup/app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }
          configurations.configureEach {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              resolutionStrategy.eachDependency { details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') details.useVersion '1.8.22'
              }
          }
          android {
              namespace 'com.example.warmup'
              compileSdk 35
              defaultConfig { applicationId 'com.example.warmup'; minSdk 23; targetSdk 35; versionCode 1; versionName '1.0' }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation platform('org.jetbrains.kotlin:kotlin-bom:1.8.22')
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              implementation 'androidx.core:core:1.13.1'
              implementation 'androidx.exifinterface:exifinterface:1.3.7'
              implementation 'com.google.zxing:core:3.5.3'
              implementation 'com.google.mlkit:text-recognition:16.0.1'
              implementation 'com.rmtheis:tess-two:9.1.0'
          }
          EOF
          cat > warmup/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/AppTheme"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>
          EOF
          mkdir -p warmup/app/src/main/res/values
          cat > warmup/app/src/main/res/values/styles.xml <<'EOF'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/></resources>
          EOF
          cat > warmup/app/src/main/java/com/example/warmup/MainActivity.java <<'EOF'
          package com.example.warmup; public class MainActivity extends android.app.Activity { }
          EOF
          gradle -p warmup --no-daemon --stacktrace assembleDebug

      - name: Package offline toolchain
        shell: bash
        run: |
          set -euxo pipefail
          OUT="$RUNNER_TEMP/doccenter-toolchain"
          mkdir -p "$OUT/android-sdk/platforms" "$OUT/android-sdk/build-tools" "$OUT/android-sdk/platform-tools" "$OUT/android-sdk/licenses" "$OUT/gradle-user-home"
          cp -a "$ANDROID_HOME/platforms/android-35" "$OUT/android-sdk/platforms/"
          cp -a "$ANDROID_HOME/build-tools/35.0.0" "$OUT/android-sdk/build-tools/"
          cp -a "$ANDROID_HOME/platform-tools/." "$OUT/android-sdk/platform-tools/"
          cp -a "$ANDROID_HOME/licenses/." "$OUT/android-sdk/licenses/" || true
          GRADLE_BIN="$(readlink -f "$(command -v gradle)")"
          GRADLE_HOME="$(dirname "$(dirname "$GRADLE_BIN")")"
          cp -a "$GRADLE_HOME" "$OUT/gradle"
          cp -a "$HOME/.gradle/caches" "$OUT/gradle-user-home/"
          cp -a "$HOME/.gradle/native" "$OUT/gradle-user-home/" || true
          cp -a "$HOME/.gradle/notifications" "$OUT/gradle-user-home/" || true
          cp -a "$HOME/.gradle/wrapper" "$OUT/gradle-user-home/" || true
          du -sh "$OUT"/* || true
          tar -I 'zstd -6 -T0' -cf "$RUNNER_TEMP/doccenter-android-toolchain.tar.zst" -C "$RUNNER_TEMP" doccenter-toolchain
          ls -lh "$RUNNER_TEMP/doccenter-android-toolchain.tar.zst"

      - name: Upload offline toolchain
        uses: actions/upload-artifact@v4
        with:
          name: doccenter-android-toolchain
          path: ${{ runner.temp }}/doccenter-android-toolchain.tar.zst
          compression-level: 0
          retention-days: 1
