name: Build NIKA Voice V1 Full

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore complete Android project
        shell: bash
        run: |
          set -euo pipefail
          cat payload/fullsrc.*.txt | base64 -d > nika_full_source.tar.gz
          tar -xzf nika_full_source.tar.gz
          mkdir -p nika_full_project/app/src/main/res/raw
          cat payload/video.*.txt | base64 -d > nika_full_project/app/src/main/res/raw/nika_background.mp4
          test -f nika_full_project/app/src/main/java/ru/nika/voice/MainActivity.java
          test -f nika_full_project/app/src/main/java/ru/nika/voice/AssistantController.java
          test -s nika_full_project/app/src/main/res/raw/nika_background.mp4
          file nika_full_project/app/src/main/res/raw/nika_background.mp4
          du -h nika_full_project/app/src/main/res/raw/nika_background.mp4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Compile, test and package
        shell: bash
        run: |
          set -euo pipefail
          gradle -p nika_full_project clean :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease --stacktrace
          cp nika_full_project/app/build/outputs/apk/debug/app-debug.apk NIKA_VOICE_V1_FULL_DEBUG.apk
          cp nika_full_project/app/build/outputs/apk/release/app-release-unsigned.apk NIKA_VOICE_V1_FULL_RELEASE_UNSIGNED.apk
          ${ANDROID_HOME}/build-tools/35.0.0/aapt dump badging NIKA_VOICE_V1_FULL_DEBUG.apk > APK_BADGING.txt
          sha256sum NIKA_VOICE_V1_FULL_DEBUG.apk NIKA_VOICE_V1_FULL_RELEASE_UNSIGNED.apk > SHA256SUMS.txt
          unzip -l NIKA_VOICE_V1_FULL_DEBUG.apk > APK_CONTENTS.txt
          ls -lh NIKA_VOICE_V1_FULL_DEBUG.apk NIKA_VOICE_V1_FULL_RELEASE_UNSIGNED.apk

      - name: Upload full APK build
        uses: actions/upload-artifact@v4
        with:
          name: NIKA_VOICE_V1_FULL_BUILD
          path: |
            NIKA_VOICE_V1_FULL_DEBUG.apk
            NIKA_VOICE_V1_FULL_RELEASE_UNSIGNED.apk
            SHA256SUMS.txt
            APK_BADGING.txt
            APK_CONTENTS.txt
            nika_full_project/app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: error
          retention-days: 30
