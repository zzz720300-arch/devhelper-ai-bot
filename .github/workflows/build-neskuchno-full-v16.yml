name: Build full Neskuchno Compose V16

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx5g -Dfile.encoding=UTF-8

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: Restore original full Compose source and apply V16
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee restore.log) 2>&1
          echo checkout > restore-stage.txt
          ls -l payload/neskuchno-v14 payload/neskuchno-v16 | tee payload-files.txt
          echo source-decode > restore-stage.txt
          cat payload/neskuchno-v14/source.*.txt | tr -d '\r\n ' | base64 -d > source.tar.xz
          sha256sum source.tar.xz | tee source-actual-sha256.txt
          xz -t source.tar.xz
          echo source-extract > restore-stage.txt
          mkdir restored
          tar -xJf source.tar.xz -C restored
          ROOT="$(find restored -name settings.gradle.kts -printf '%h\n' | head -n1)"
          test -n "$ROOT"
          echo patch-decode > restore-stage.txt
          cat payload/neskuchno-v16/patch.part*.b64 | tr -d '\r\n ' | base64 -d > patch.zip
          sha256sum patch.zip | tee patch-actual-sha256.txt
          echo '901bb0766af82849827af67ccb1e600ac5ee79a9f662812695fa769bd5fe1f52  patch.zip' | sha256sum -c -
          unzip -t patch.zip | tee patch-zip-test.txt
          echo patch-apply > restore-stage.txt
          unzip -oq patch.zip -d "$ROOT"
          while IFS= read -r relative; do
            [ -z "$relative" ] || rm -f "$ROOT/$relative"
          done < "$ROOT/DELETE_LIST.txt"
          rm -f "$ROOT/DELETE_LIST.txt"
          echo static-verify > restore-stage.txt
          python3 "$ROOT/scripts/VERIFY_STATIC.py" | tee static-verification.txt
          echo complete > restore-stage.txt
          echo "PROJECT_ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: Audit exact requested integrations
        shell: bash
        run: |
          set -euo pipefail
          MAIN="$PROJECT_ROOT/app/src/main"
          grep -Rqs 'qwen/qwen3.5-flash-02-23' "$PROJECT_ROOT/app"
          grep -Rqs 'google/gemini-3.1-flash-tts-preview' "$PROJECT_ROOT/app"
          grep -Rqs 'Zephyr' "$PROJECT_ROOT/app"
          grep -Rqs 'openai/whisper-large-v3-turbo' "$PROJECT_ROOT/app"
          grep -Rqs 'AudioRecord' "$MAIN/java"
          grep -Rqs 'локальные заготовки запрещены' "$MAIN/assets/prompts/absurd_news_system.txt"
          ! grep -RIns --include='*.kt' -E 'RecognizerIntent|SpeechRecognizer|ACTION_RECOGNIZE_SPEECH|android\.speech' "$MAIN/java"
          ! grep -RIns -E 'offline_absurd_news|LocalFunRepository|randomAbsurdNews' "$MAIN"
          test "$(cat "$MAIN/assets/config/routerai_key.txt")" = 'ROUTERAI_KEY_PLACEHOLDER'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and Gradle
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools'
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 --max-time 600 https://services.gradle.org/distributions/gradle-8.13-bin.zip -o "$RUNNER_TEMP/gradle.zip"
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          echo "GRADLE_BIN=$RUNNER_TEMP/gradle-8.13/bin/gradle" >> "$GITHUB_ENV"

      - name: Compile, test, lint and assemble full release
        shell: bash
        run: |
          set -euo pipefail
          export GRADLE_USER_HOME="$RUNNER_TEMP/gradle-home"
          "$GRADLE_BIN" -p "$PROJECT_ROOT" --no-daemon --console=plain clean testDebugUnitTest lintDebug lintRelease assembleRelease --stacktrace | tee gradle-build.log
          APK="$(find "$PROJECT_ROOT/app/build/outputs/apk/release" -type f -name '*.apk' | head -n1)"
          test -s "$APK"
          cp "$APK" NESKUCHNO_FULL_COMPOSE_V16_RELEASE_UNSIGNED_PLACEHOLDER.apk
          tar -cJf NESKUCHNO_FULL_COMPOSE_V16_SOURCE_PLACEHOLDER.tar.xz -C "$(dirname "$PROJECT_ROOT")" "$(basename "$PROJECT_ROOT")"
          sha256sum NESKUCHNO_FULL_COMPOSE_V16_RELEASE_UNSIGNED_PLACEHOLDER.apk NESKUCHNO_FULL_COMPOSE_V16_SOURCE_PLACEHOLDER.tar.xz > CI_SHA256SUMS.txt

      - name: Verify APK structure and metadata
        shell: bash
        run: |
          set -euo pipefail
          APK=NESKUCHNO_FULL_COMPOSE_V16_RELEASE_UNSIGNED_PLACEHOLDER.apk
          BT="$ANDROID_HOME/build-tools/35.0.0"
          "$BT/aapt" dump badging "$APK" > apk-badging.txt
          "$BT/aapt" dump permissions "$APK" > apk-permissions.txt
          unzip -t "$APK" > apk-zip-test.txt
          grep -q "package: name='ru.quantai.neskuchno'" apk-badging.txt
          grep -q 'android.permission.INTERNET' apk-permissions.txt
          grep -q 'android.permission.RECORD_AUDIO' apk-permissions.txt
          ! grep -q 'android.permission.CAMERA' apk-permissions.txt
          unzip -p "$APK" assets/config/routerai_key.txt > embedded-key.txt
          test "$(cat embedded-key.txt)" = 'ROUTERAI_KEY_PLACEHOLDER'
          rm -rf dex-check && mkdir dex-check
          unzip -q "$APK" 'classes*.dex' -d dex-check
          find dex-check -name 'classes*.dex' -print0 | xargs -0 strings > dex-strings.txt
          grep -q 'qwen/qwen3.5-flash-02-23' dex-strings.txt
          grep -q 'google/gemini-3.1-flash-tts-preview' dex-strings.txt
          grep -q 'openai/whisper-large-v3-turbo' dex-strings.txt
          grep -q 'Zephyr' dex-strings.txt
          SIZE="$(stat -c%s "$APK")"
          test "$SIZE" -gt 1000000
          echo "APK_BYTES=$SIZE" | tee apk-size.txt

      - name: Package Android signing tools
        shell: bash
        run: |
          set -euo pipefail
          BT="$ANDROID_HOME/build-tools/35.0.0"
          mkdir -p signing-tools/lib
          cp "$BT/apksigner" "$BT/zipalign" signing-tools/
          cp "$BT/lib/apksigner.jar" signing-tools/lib/
          chmod +x signing-tools/apksigner signing-tools/zipalign
          tar -czf ANDROID_SIGNING_TOOLS_35.tar.gz signing-tools

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NESKUCHNO_FULL_COMPOSE_V16_CI
          path: |
            restore.log
            restore-stage.txt
            payload-files.txt
            source-actual-sha256.txt
            patch-actual-sha256.txt
            patch-zip-test.txt
            NESKUCHNO_FULL_COMPOSE_V16_RELEASE_UNSIGNED_PLACEHOLDER.apk
            NESKUCHNO_FULL_COMPOSE_V16_SOURCE_PLACEHOLDER.tar.xz
            CI_SHA256SUMS.txt
            static-verification.txt
            gradle-build.log
            apk-badging.txt
            apk-permissions.txt
            apk-zip-test.txt
            apk-size.txt
            dex-strings.txt
            ANDROID_SIGNING_TOOLS_35.tar.gz
          if-no-files-found: warn
          compression-level: 0
          retention-days: 14
