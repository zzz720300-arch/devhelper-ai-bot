name: Diagnose Neskuchno V15 lint
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Restore source
        shell: bash
        run: |
          set -euo pipefail
          cat ci_payload/neskuchno-v15/source.part00 ci_payload/neskuchno-v15/source.part01 ci_payload/neskuchno-v15/source.part02 ci_payload/neskuchno-v15/source.part03 ci_payload/neskuchno-v15/source.part04a ci_payload/neskuchno-v15/source.part04b ci_payload/neskuchno-v15/source.part05 ci_payload/neskuchno-v15/source.part06 ci_payload/neskuchno-v15/source.part07 | tr -d '\r\n ' | base64 -d > source.tar.xz
          echo 'fbb97de69873202d21ac16955d0babde808302bb39eb304cda3032ea22733080  source.tar.xz' | sha256sum -c -
          mkdir restored && tar -xJf source.tar.xz -C restored
          ROOT="$(find restored -name settings.gradle.kts -printf '%h\n' | head -n1)"
          UI="$ROOT/app/src/main/java/ru/quantai/neskuchno/UiFactory.java"
          sed -i 's/button\.setTextAllCaps(false);/button.setAllCaps(false);/' "$UI"
          echo "PROJECT_ROOT=$ROOT" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0'
          curl -fL --retry 5 https://services.gradle.org/distributions/gradle-8.13-bin.zip -o "$RUNNER_TEMP/gradle.zip"
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          echo "GRADLE_BIN=$RUNNER_TEMP/gradle-8.13/bin/gradle" >> "$GITHUB_ENV"
      - name: Run lint while suppressing only known predictive-back incident
        continue-on-error: true
        shell: bash
        run: |
          printf '\nandroid { lint { disable += "GestureBackNavigation" } }\n' >> "$PROJECT_ROOT/app/build.gradle.kts"
          export GRADLE_USER_HOME="$RUNNER_TEMP/gradle-home"
          "$GRADLE_BIN" -p "$PROJECT_ROOT" --no-daemon --console=plain lintRelease --stacktrace > lint-build.log 2>&1
      - name: Collect and print lint reports
        if: always()
        shell: bash
        run: |
          find "$PROJECT_ROOT/app/build" -type f -iname 'lint-results*' -print
          REPORT="$(find "$PROJECT_ROOT/app/build" -type f -name 'lint-results-release.txt' | head -n1)"
          if [ -n "$REPORT" ]; then cp "$REPORT" lint-results-release.txt; cat lint-results-release.txt; fi
          tail -n 240 lint-build.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NESKUCHNO_V15_LINT_DIAGNOSTIC
          path: |
            lint-results-release.txt
            lint-build.log
          if-no-files-found: warn
          compression-level: 0
