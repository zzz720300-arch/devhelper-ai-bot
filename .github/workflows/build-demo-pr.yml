name: Build Demo Voice APK

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Android source
        shell: bash
        run: |
          set -euo pipefail
          cat payload/demo-source.*.txt | base64 -d > demo-source.tar.gz
          tar -xzf demo-source.tar.gz
          test -f demo_android_project/app/src/main/java/ru/demo/player/MainActivity.java

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Package signing tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signing-tools/lib
          cp "$ANDROID_HOME/build-tools/35.0.0/apksigner" signing-tools/
          cp "$ANDROID_HOME/build-tools/35.0.0/zipalign" signing-tools/
          cp "$ANDROID_HOME/build-tools/35.0.0/lib/apksigner.jar" signing-tools/lib/
          chmod +x signing-tools/apksigner signing-tools/zipalign
          tar -czf ANDROID_SIGNING_TOOLS_35.tar.gz signing-tools

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p demo_android_project clean :app:assembleDebug --stacktrace
          cp demo_android_project/app/build/outputs/apk/debug/app-debug.apk DEMO_PLACEHOLDER.apk
          sha256sum DEMO_PLACEHOLDER.apk > DEMO_PLACEHOLDER.sha256
          ls -lh DEMO_PLACEHOLDER.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DEMO_VOICE_APK
          path: |
            DEMO_PLACEHOLDER.apk
            DEMO_PLACEHOLDER.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload signing tools
        uses: actions/upload-artifact@v4
        with:
          name: ANDROID_SIGNING_TOOLS_35
          path: ANDROID_SIGNING_TOOLS_35.tar.gz
          if-no-files-found: error
          retention-days: 7
