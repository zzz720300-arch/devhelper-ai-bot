name: Bootstrap DocCenter Gradle Cache

on:
  push:
    paths:
      - '.github/workflows/bootstrap-doccenter-gradle-cache.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Prepare Gradle and SDK
        shell: bash
        run: |
          set -euxo pipefail
          curl -L --retry 5 -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"
      - name: Resolve exact DocCenter dependencies
        shell: bash
        run: |
          set -euxo pipefail
          P=/tmp/doccenter-cache-project
          rm -rf "$P"
          mkdir -p "$P/app/src/main/java/cache/bootstrap"
          cat > "$P/settings.gradle" <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'DocCenterCacheBootstrap'
          include ':app'
          EOF
          cat > "$P/build.gradle" <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF
          cat > "$P/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF
          cat > "$P/app/build.gradle" <<'EOF'
          plugins { id 'com.android.application' }
          configurations.configureEach {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
              resolutionStrategy.eachDependency { details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') details.useVersion '1.8.22'
              }
          }
          android {
              namespace 'cache.bootstrap'
              compileSdk 35
              defaultConfig { applicationId 'cache.bootstrap'; minSdk 23; targetSdk 35; versionCode 1; versionName '1' }
              buildTypes { release { minifyEnabled false; shrinkResources false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation platform('org.jetbrains.kotlin:kotlin-bom:1.8.22')
              implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              implementation 'androidx.core:core:1.13.1'
              implementation 'androidx.exifinterface:exifinterface:1.3.7'
              implementation 'com.google.zxing:core:3.5.3'
              implementation 'com.google.mlkit:text-recognition:16.0.1'
              implementation 'com.rmtheis:tess-two:9.1.0'
          }
          EOF
          cat > "$P/app/src/main/AndroidManifest.xml" <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/AppTheme"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>
          EOF
          mkdir -p "$P/app/src/main/res/values"
          cat > "$P/app/src/main/res/values/styles.xml" <<'EOF'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/></resources>
          EOF
          cat > "$P/app/src/main/java/cache/bootstrap/MainActivity.java" <<'EOF'
          package cache.bootstrap;
          public class MainActivity extends android.app.Activity { }
          EOF
          /tmp/gradle-8.9/bin/gradle -p "$P" clean assembleRelease --no-daemon --stacktrace
      - name: Package Gradle cache
        shell: bash
        run: |
          set -euxo pipefail
          tar -C "$HOME" -czf /tmp/doccenter-gradle-cache.tar.gz .gradle/caches .gradle/native .gradle/notifications 2>/dev/null || tar -C "$HOME" -czf /tmp/doccenter-gradle-cache.tar.gz .gradle/caches
          sha256sum /tmp/doccenter-gradle-cache.tar.gz
          du -sh /tmp/doccenter-gradle-cache.tar.gz "$HOME/.gradle/caches"
      - name: Upload Gradle cache
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: doccenter-gradle-cache
          path: /tmp/doccenter-gradle-cache.tar.gz
          compression-level: 0
          retention-days: 1
      - name: Store cache artifact metadata
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p tools-cache
          printf '%s\n' "$GITHUB_RUN_ID" > tools-cache/gradle-cache-run-id.txt
          printf '%s\n' "${{ steps.upload.outputs.artifact-id }}" > tools-cache/gradle-cache-artifact-id.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools-cache/gradle-cache-run-id.txt tools-cache/gradle-cache-artifact-id.txt
          git commit -m "chore: record Gradle cache artifact [skip ci]"
          git push
