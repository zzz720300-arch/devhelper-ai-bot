name: Prefetch V16 Gradle dependency cache

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: neskuchno-v16-gradle-cache
  cancel-in-progress: true

jobs:
  cache:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK and Gradle
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools'
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 --max-time 600 https://services.gradle.org/distributions/gradle-8.13-bin.zip -o "$RUNNER_TEMP/gradle.zip"
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          echo "GRADLE_BIN=$RUNNER_TEMP/gradle-8.13/bin/gradle" >> "$GITHUB_ENV"
      - name: Generate dependency-equivalent Android project
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prefetch"
          mkdir -p "$ROOT/app/src/main/java/cache/prefetch" "$ROOT/app/src/main/res/values" "$ROOT/app/src/test/java/cache/prefetch"
          cat > "$ROOT/settings.gradle.kts" <<'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "Prefetch"
          include(":app")
          EOF
          cat > "$ROOT/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application") version "8.13.2" apply false
              id("org.jetbrains.kotlin.android") version "2.3.21" apply false
              id("org.jetbrains.kotlin.plugin.compose") version "2.3.21" apply false
              id("org.jetbrains.kotlin.kapt") version "2.3.21" apply false
          }
          EOF
          cat > "$ROOT/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx5g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          EOF
          cat > "$ROOT/app/build.gradle.kts" <<'EOF'
          import org.jetbrains.kotlin.gradle.dsl.JvmTarget
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("org.jetbrains.kotlin.plugin.compose")
              id("org.jetbrains.kotlin.kapt")
          }
          android {
              namespace = "cache.prefetch"
              compileSdk = 36
              defaultConfig { applicationId = "cache.prefetch"; minSdk = 26; targetSdk = 36; versionCode = 1; versionName = "1"; testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner" }
              buildFeatures { compose = true; buildConfig = true }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
          }
          kotlin { compilerOptions { jvmTarget.set(JvmTarget.JVM_17) } }
          kapt { correctErrorTypes = true }
          dependencies {
              implementation("androidx.core:core-ktx:1.17.0")
              implementation("androidx.activity:activity-compose:1.13.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.10.0")
              implementation("androidx.lifecycle:lifecycle-runtime-compose:2.10.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.10.0")
              implementation("androidx.navigation:navigation-compose:2.9.8")
              implementation(platform("androidx.compose:compose-bom:2026.06.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              implementation("androidx.room:room-runtime:2.8.4")
              implementation("androidx.room:room-ktx:2.8.4")
              kapt("androidx.room:room-compiler:2.8.4")
              implementation("androidx.datastore:datastore-preferences:1.2.1")
              implementation("androidx.work:work-runtime-ktx:2.11.2")
              implementation("androidx.media3:media3-exoplayer:1.9.3")
              implementation("androidx.media3:media3-ui:1.9.3")
              implementation("com.squareup.retrofit2:retrofit:3.0.0")
              implementation("com.squareup.retrofit2:converter-gson:3.0.0")
              implementation("com.squareup.okhttp3:okhttp:4.12.0")
              implementation("com.squareup.okhttp3:logging-interceptor:4.12.0")
              implementation("com.google.code.gson:gson:2.13.2")
              testImplementation("junit:junit:4.13.2")
              androidTestImplementation("androidx.test.ext:junit:1.3.0")
              androidTestImplementation("androidx.test.espresso:espresso-core:3.7.0")
              androidTestImplementation(platform("androidx.compose:compose-bom:2026.06.00"))
              androidTestImplementation("androidx.compose.ui:ui-test-junit4")
              debugImplementation("androidx.compose.ui:ui-tooling")
              debugImplementation("androidx.compose.ui:ui-test-manifest")
          }
          EOF
          cat > "$ROOT/app/src/main/AndroidManifest.xml" <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/AppTheme"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>
          EOF
          cat > "$ROOT/app/src/main/res/values/styles.xml" <<'EOF'
          <resources><style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/></resources>
          EOF
          cat > "$ROOT/app/src/main/java/cache/prefetch/MainActivity.kt" <<'EOF'
          package cache.prefetch
          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.material3.Text
          class MainActivity: ComponentActivity() { override fun onCreate(state: Bundle?) { super.onCreate(state); setContent { Text("cache") } } }
          EOF
          cat > "$ROOT/app/src/test/java/cache/prefetch/CacheTest.kt" <<'EOF'
          package cache.prefetch
          import org.junit.Test
          class CacheTest { @Test fun ok() = Unit }
          EOF
          echo "PREFETCH_ROOT=$ROOT" >> "$GITHUB_ENV"
      - name: Resolve every required dependency configuration
        shell: bash
        run: |
          set -euo pipefail
          export GRADLE_USER_HOME="$RUNNER_TEMP/v16-gradle-home"
          for cfg in debugCompileClasspath debugRuntimeClasspath releaseCompileClasspath releaseRuntimeClasspath kaptDebug kaptRelease debugUnitTestCompileClasspath debugAndroidTestCompileClasspath; do
            echo "=== resolving $cfg ===" | tee -a prefetch-build.log
            "$GRADLE_BIN" -p "$PREFETCH_ROOT" --no-daemon --console=plain :app:dependencies --configuration "$cfg" --stacktrace | tee -a prefetch-build.log
          done
          du -sh "$GRADLE_USER_HOME" | tee cache-size.txt
      - name: Package portable Gradle cache
        shell: bash
        run: |
          set -euo pipefail
          export GRADLE_USER_HOME="$RUNNER_TEMP/v16-gradle-home"
          find "$GRADLE_USER_HOME" -name '*.lock' -delete || true
          find "$GRADLE_USER_HOME" -type f -name 'gc.properties' -delete || true
          GZIP=-1 tar -C "$RUNNER_TEMP" -czf V16_GRADLE_HOME_CACHE.tar.gz v16-gradle-home
          sha256sum V16_GRADLE_HOME_CACHE.tar.gz > V16_GRADLE_HOME_CACHE.sha256
          ls -lh V16_GRADLE_HOME_CACHE.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: V16_GRADLE_HOME_CACHE
          path: |
            V16_GRADLE_HOME_CACHE.tar.gz
            V16_GRADLE_HOME_CACHE.sha256
            prefetch-build.log
            cache-size.txt
          retention-days: 3
          compression-level: 0
