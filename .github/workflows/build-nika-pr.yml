name: Build NIKA Voice V1 APK (PR)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Restore Android source and video
        shell: bash
        run: |
          set -euo pipefail
          cat payload/source.*.txt | base64 -d > source.tar.gz
          tar -xzf source.tar.gz
          mkdir -p nika_voice_v1/app/src/main/res/raw
          cat payload/video.*.txt | base64 -d > nika_voice_v1/app/src/main/res/raw/nika_background.mp4
          test -f nika_voice_v1/app/src/main/java/ru/nika/voice/MainActivity.java
          test -s nika_voice_v1/app/src/main/res/raw/nika_background.mp4
          file nika_voice_v1/app/src/main/res/raw/nika_background.mp4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Package Android signing tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signing-tools/lib
          cp "$ANDROID_HOME/build-tools/35.0.0/apksigner" signing-tools/
          cp "$ANDROID_HOME/build-tools/35.0.0/zipalign" signing-tools/
          cp "$ANDROID_HOME/build-tools/35.0.0/lib/apksigner.jar" signing-tools/lib/
          chmod +x signing-tools/apksigner signing-tools/zipalign
          tar -czf ANDROID_SIGNING_TOOLS_35.tar.gz signing-tools

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          gradle -p nika_voice_v1 clean :app:assembleDebug --stacktrace
          cp nika_voice_v1/app/build/outputs/apk/debug/app-debug.apk NIKA_VOICE_V1_TEST.apk
          sha256sum NIKA_VOICE_V1_TEST.apk > NIKA_VOICE_V1_TEST.sha256
          ls -lh NIKA_VOICE_V1_TEST.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NIKA_VOICE_V1_TEST_APK
          path: |
            NIKA_VOICE_V1_TEST.apk
            NIKA_VOICE_V1_TEST.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload Android signing tools
        uses: actions/upload-artifact@v4
        with:
          name: ANDROID_SIGNING_TOOLS_35
          path: ANDROID_SIGNING_TOOLS_35.tar.gz
          if-no-files-found: error
          retention-days: 7
