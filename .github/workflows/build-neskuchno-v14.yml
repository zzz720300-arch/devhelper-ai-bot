name: Build and verify Neskuchno V14 APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p restored
          cat ci_payload/neskuchno-v14/archive.part* | tr -d '\r\n ' | base64 -d > /tmp/neskuchno-source.tar.xz
          xz -t /tmp/neskuchno-source.tar.xz
          tar -xJf /tmp/neskuchno-source.tar.xz -C restored
          ROOT="$(find restored -type f \( -name settings.gradle -o -name settings.gradle.kts \) -printf '%h\n' | head -n1)"
          test -n "$ROOT"
          echo "PROJECT_ROOT=$ROOT" >> "$GITHUB_ENV"
          echo "Project root: $ROOT"
          find "$ROOT" -maxdepth 2 -type f | sort | sed -n '1,120p'

      - name: Verify own microphone and AI service wiring
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PROJECT_ROOT"
          ! grep -RIn --include='*.kt' --include='*.java' -E 'RecognizerIntent|android\.speech\.SpeechRecognizer|ACTION_RECOGNIZE_SPEECH' "$ROOT/app/src/main"
          grep -RIn --include='*.kt' --include='*.java' 'AudioRecord' "$ROOT/app/src/main"
          grep -RIn --include='*.kt' --include='*.java' -E 'chat/completions|audio/speech|audio/transcriptions' "$ROOT/app/src/main"
          grep -RIn --include='*.kt' --include='*.java' 'qwen/qwen3.5-flash-02-23' "$ROOT" >/dev/null
          grep -RIn --include='*.kt' --include='*.java' 'x-ai/grok-voice-tts-1.0' "$ROOT" >/dev/null
          if grep -RIn --include='*.kt' --include='*.java' 'okhttp3\.dnsoverhttps' "$ROOT"; then
            echo 'Forbidden obsolete DoH source remains' >&2
            exit 1
          fi
          if grep -RIn --include='*.gradle' --include='*.gradle.kts' 'dnsoverhttps' "$ROOT"; then
            echo 'Forbidden obsolete DoH dependency remains' >&2
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'platform-tools'
          sdkmanager 'build-tools;36.1.0' || sdkmanager 'build-tools;36.0.0'

      - name: Compile, unit test, lint and assemble APK
        id: gradlebuild
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PROJECT_ROOT"
          if [ -x "$ROOT/gradlew" ]; then
            "$ROOT/gradlew" -p "$ROOT" --no-daemon --console=plain clean testDebugUnitTest lintDebug assembleDebug --stacktrace | tee build.log
          else
            gradle -p "$ROOT" --no-daemon --console=plain clean testDebugUnitTest lintDebug assembleDebug --stacktrace | tee build.log
          fi
          APK="$(find "$ROOT/app/build/outputs/apk/debug" -name '*.apk' -type f | head -n1)"
          test -s "$APK"
          cp "$APK" NESKUCHNO_V14_DEBUG.apk
          sha256sum NESKUCHNO_V14_DEBUG.apk > NESKUCHNO_V14_DEBUG.sha256

      - name: Verify APK package, permissions and signature
        shell: bash
        run: |
          set -euo pipefail
          BT="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n1)"
          "$BT/aapt" dump badging NESKUCHNO_V14_DEBUG.apk > apk-badging.txt
          "$BT/aapt" dump permissions NESKUCHNO_V14_DEBUG.apk > apk-permissions.txt
          "$BT/apksigner" verify --verbose --print-certs NESKUCHNO_V14_DEBUG.apk > apk-signature.txt
          unzip -t NESKUCHNO_V14_DEBUG.apk > apk-zip-test.txt
          grep -q "package: name='ru.quantai.neskuchno" apk-badging.txt
          grep -q 'android.permission.INTERNET' apk-permissions.txt
          grep -q 'android.permission.RECORD_AUDIO' apk-permissions.txt
          ! grep -q 'android.permission.CAMERA' apk-permissions.txt
          unzip -p NESKUCHNO_V14_DEBUG.apk classes.dex | strings | grep -q 'qwen/qwen3.5-flash-02-23'
          unzip -p NESKUCHNO_V14_DEBUG.apk classes.dex | strings | grep -q 'x-ai/grok-voice-tts-1.0'

      - name: RouterAI live smoke tests
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PROJECT_ROOT"
          KEY="$(grep -RhsE '^ROUTERAI_TEST_KEY=' "$ROOT" | head -n1 | cut -d= -f2- | tr -d '\r\n')"
          if [ -z "$KEY" ]; then
            KEY="$(find "$ROOT" -type f -iname '*routerai*key*' -o -iname 'routerai_key.txt' | head -n1 | xargs -r cat | tr -d '\r\n ')"
          fi
          test -n "$KEY"
          echo "::add-mask::$KEY"
          CHAT_CODE="$(curl --retry 3 --retry-all-errors --max-time 90 -sS -o routerai-chat.json -w '%{http_code}' \
            https://routerai.ru/api/v1/chat/completions \
            -H "Authorization: Bearer $KEY" \
            -H 'Content-Type: application/json' \
            -d '{"model":"qwen/qwen3.5-flash-02-23","messages":[{"role":"user","content":"Ответь одним словом: работает"}],"max_tokens":20}')"
          test "$CHAT_CODE" = 200
          python3 - <<'PY'
          import json
          data=json.load(open('routerai-chat.json',encoding='utf-8'))
          text=data['choices'][0]['message']['content'].strip()
          assert text, data
          print('LLM response received; length=', len(text))
          PY
          TTS_CODE="$(curl --retry 2 --retry-all-errors --max-time 120 -sS -o routerai-tts.mp3 -w '%{http_code}' \
            https://routerai.ru/api/v1/audio/speech \
            -H "Authorization: Bearer $KEY" \
            -H 'Content-Type: application/json' \
            -d '{"model":"x-ai/grok-voice-tts-1.0","input":"Проверка голоса приложения.","voice":"eve","response_format":"mp3"}')"
          test "$TTS_CODE" = 200
          test "$(stat -c%s routerai-tts.mp3)" -gt 1000
          file routerai-tts.mp3 | tee routerai-tts-file.txt

      - name: Emulator launch smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          profile: Nexus 6
          disable-animations: true
          script: |
            set -euo pipefail
            adb install -r NESKUCHNO_V14_DEBUG.apk
            adb shell pm grant ru.quantai.neskuchno.debug android.permission.RECORD_AUDIO || true
            adb shell am force-stop ru.quantai.neskuchno.debug
            adb shell am start -W -n ru.quantai.neskuchno.debug/ru.quantai.neskuchno.MainActivity | tee emulator-start.txt
            sleep 8
            PID="$(adb shell pidof ru.quantai.neskuchno.debug | tr -d '\r')"
            test -n "$PID"
            adb exec-out screencap -p > emulator-home.png
            adb shell uiautomator dump /sdcard/window.xml >/dev/null
            adb pull /sdcard/window.xml emulator-window.xml >/dev/null
            adb logcat -d > emulator-logcat.txt
            if grep -E 'FATAL EXCEPTION|ANR in ru.quantai.neskuchno|Process: ru.quantai.neskuchno' emulator-logcat.txt; then
              exit 1
            fi

      - name: Upload verified APK and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NESKUCHNO_V14_VERIFIED_APK
          path: |
            NESKUCHNO_V14_DEBUG.apk
            NESKUCHNO_V14_DEBUG.sha256
            build.log
            apk-badging.txt
            apk-permissions.txt
            apk-signature.txt
            apk-zip-test.txt
            routerai-chat.json
            routerai-tts-file.txt
            emulator-start.txt
            emulator-home.png
            emulator-window.xml
            emulator-logcat.txt
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0
