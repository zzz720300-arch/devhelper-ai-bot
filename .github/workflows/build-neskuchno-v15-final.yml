name: Build and verify Neskuchno V15 final

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4

      - name: Restore exact source and apply audited fixes
        shell: bash
        run: |
          set -euo pipefail
          cat ci_payload/neskuchno-v15/source.part00 ci_payload/neskuchno-v15/source.part01 ci_payload/neskuchno-v15/source.part02 ci_payload/neskuchno-v15/source.part03 ci_payload/neskuchno-v15/source.part04a ci_payload/neskuchno-v15/source.part04b ci_payload/neskuchno-v15/source.part05 ci_payload/neskuchno-v15/source.part06 ci_payload/neskuchno-v15/source.part07 | tr -d '\r\n ' | base64 -d > source.tar.xz
          echo 'fbb97de69873202d21ac16955d0babde808302bb39eb304cda3032ea22733080  source.tar.xz' | sha256sum -c -
          xz -t source.tar.xz
          mkdir restored
          tar -xJf source.tar.xz -C restored
          ROOT="$(find restored -name settings.gradle.kts -printf '%h\n' | head -n1)"
          test -n "$ROOT"
          python3 ci_payload/neskuchno-v15/apply_source_fixes.py "$ROOT"
          echo "PROJECT_ROOT=$ROOT" >> "$GITHUB_ENV"

      - name: Audit architecture and integrations
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$PROJECT_ROOT"
          MAIN="$ROOT/app/src/main"
          ! grep -RIn --include='*.java' -E 'RecognizerIntent|SpeechRecognizer|ACTION_RECOGNIZE_SPEECH|DnsOverHttps|ResilientDns' "$MAIN"
          grep -RIn --include='*.java' 'AudioRecord' "$MAIN"
          grep -RIn --include='*.java' -E 'chat/completions|audio/speech|audio/transcriptions' "$MAIN"
          grep -RIn --include='*.java' 'qwen/qwen3.5-flash-02-23' "$MAIN"
          grep -RIn --include='*.java' 'x-ai/grok-voice-tts-1.0' "$MAIN"
          grep -RIn --include='*.java' 'openai/whisper-1' "$MAIN"
          python3 - <<'PY'
          import json, os
          root=os.environ['PROJECT_ROOT']
          stories=json.load(open(root+'/app/src/main/assets/stories/stories.json',encoding='utf-8'))
          assert len(stories)>=12, len(stories)
          print('stories=',len(stories))
          PY

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK, emulator and Gradle
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-36' 'build-tools;35.0.0' 'platform-tools' 'emulator' 'system-images;android-29;default;x86_64'
          curl -fL --retry 5 --retry-all-errors --connect-timeout 30 --max-time 600 https://services.gradle.org/distributions/gradle-8.13-bin.zip -o "$RUNNER_TEMP/gradle.zip"
          unzip -q "$RUNNER_TEMP/gradle.zip" -d "$RUNNER_TEMP"
          test -x "$RUNNER_TEMP/gradle-8.13/bin/gradle"
          echo "GRADLE_BIN=$RUNNER_TEMP/gradle-8.13/bin/gradle" >> "$GITHUB_ENV"

      - name: Compile, unit test, lint and assemble
        id: gradle
        shell: bash
        run: |
          set +e
          export GRADLE_USER_HOME="$RUNNER_TEMP/gradle-home"
          "$GRADLE_BIN" -p "$PROJECT_ROOT" --no-daemon --console=plain clean testDebugUnitTest lintDebug lintRelease assembleDebug assembleRelease --stacktrace > build.log 2>&1
          CODE=$?
          tail -n 360 build.log
          if [ "$CODE" -ne 0 ]; then exit "$CODE"; fi
          DEBUG_APK="$(find "$PROJECT_ROOT/app/build/outputs/apk/debug" -type f -name '*.apk' | head -n1)"
          RELEASE_APK="$(find "$PROJECT_ROOT/app/build/outputs/apk/release" -type f -name '*.apk' | head -n1)"
          test -s "$DEBUG_APK"
          test -s "$RELEASE_APK"
          cp "$DEBUG_APK" NESKUCHNO_V15_DEBUG.apk
          cp "$RELEASE_APK" NESKUCHNO_V15_RELEASE_UNSIGNED.apk
          sha256sum NESKUCHNO_V15_DEBUG.apk NESKUCHNO_V15_RELEASE_UNSIGNED.apk > APK_SHA256.txt

      - name: Verify APK metadata, permissions and content
        shell: bash
        run: |
          set -euo pipefail
          APK=NESKUCHNO_V15_DEBUG.apk
          BT="$ANDROID_HOME/build-tools/35.0.0"
          "$BT/aapt" dump badging "$APK" > debug-badging.txt
          "$BT/aapt" dump permissions "$APK" > debug-permissions.txt
          "$BT/apksigner" verify --verbose --print-certs "$APK" > debug-signature.txt
          unzip -t "$APK" > debug-zip-test.txt
          unzip -t NESKUCHNO_V15_RELEASE_UNSIGNED.apk > release-zip-test.txt
          grep -q "package: name='ru.quantai.neskuchno.debug' versionCode='15'" debug-badging.txt
          grep -q "versionName='1.0.0-v15-debug'" debug-badging.txt
          grep -q 'android.permission.INTERNET' debug-permissions.txt
          grep -q 'android.permission.RECORD_AUDIO' debug-permissions.txt
          ! grep -q 'android.permission.CAMERA' debug-permissions.txt
          unzip -p "$APK" assets/config/routerai_key.txt | grep -q 'ROUTERAI_KEY_PLACEHOLDER'
          DEX_FILES="$(unzip -Z1 "$APK" | grep -E '^classes([0-9]+)?\.dex$')"
          for NEEDLE in 'qwen/qwen3.5-flash-02-23' 'x-ai/grok-voice-tts-1.0' 'openai/whisper-1'; do
            FOUND=0
            while IFS= read -r DEX; do
              if unzip -p "$APK" "$DEX" | strings | grep -Fq "$NEEDLE"; then FOUND=1; break; fi
            done <<< "$DEX_FILES"
            test "$FOUND" = 1
          done

      - name: Package Android signing tools
        shell: bash
        run: |
          set -euo pipefail
          BT="$ANDROID_HOME/build-tools/35.0.0"
          mkdir -p signing-tools/lib
          cp "$BT/apksigner" "$BT/zipalign" signing-tools/
          cp "$BT/lib/apksigner.jar" signing-tools/lib/
          chmod +x signing-tools/apksigner signing-tools/zipalign
          tar -czf ANDROID_SIGNING_TOOLS_35.tar.gz signing-tools

      - name: Create and boot controlled Android emulator
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_AVD_HOME="$RUNNER_TEMP/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          echo no | avdmanager create avd --force --name neskuchno_ci --package 'system-images;android-29;default;x86_64' --device 'Nexus 6'
          sudo chmod 666 /dev/kvm || true
          nohup emulator -avd neskuchno_ci -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -wipe-data -accel auto > emulator-console.log 2>&1 &
          echo $! > emulator.pid
          adb wait-for-device
          timeout 420 bash -c 'until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do sleep 5; done'
          adb shell input keyevent 82 || true
          adb devices -l | tee emulator-devices.txt

      - name: Install, launch, navigate and restart APK
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE=ru.quantai.neskuchno.debug
          ACTIVITY=ru.quantai.neskuchno.MainActivity
          adb install -r NESKUCHNO_V15_DEBUG.apk | tee emulator-install.txt
          adb shell pm grant "$PACKAGE" android.permission.RECORD_AUDIO || true
          adb shell am force-stop "$PACKAGE"
          adb shell am start -W -n "$PACKAGE/$ACTIVITY" | tee emulator-start.txt
          sleep 8
          test -n "$(adb shell pidof "$PACKAGE" | tr -d '\r')"
          adb exec-out screencap -p > emulator-home.png
          adb shell uiautomator dump /sdcard/home.xml >/dev/null
          adb pull /sdcard/home.xml emulator-home.xml >/dev/null
          grep -q 'НЕСКУЧНО' emulator-home.xml
          adb shell input tap 470 890
          sleep 3
          adb exec-out screencap -p > emulator-feature.png
          adb shell uiautomator dump /sdcard/feature.xml >/dev/null
          adb pull /sdcard/feature.xml emulator-feature.xml >/dev/null
          adb logcat -d > emulator-logcat.txt
          if grep -E 'FATAL EXCEPTION|ANR in ru.quantai.neskuchno|Process: ru.quantai.neskuchno' emulator-logcat.txt; then exit 1; fi
          adb shell am force-stop "$PACKAGE"
          adb shell am start -W -n "$PACKAGE/$ACTIVITY" | tee emulator-restart.txt
          sleep 4
          test -n "$(adb shell pidof "$PACKAGE" | tr -d '\r')"
          adb shell am force-stop "$PACKAGE"

      - name: Write verification report
        if: always()
        shell: bash
        run: |
          printf 'NESKUCHNO V15\ncommit=%s\nrun=%s\ngradle=%s\n' "$GITHUB_SHA" "$GITHUB_RUN_ID" '${{ steps.gradle.outcome }}' > CI_VERIFICATION.txt

      - name: Upload APK and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NESKUCHNO_V15_CI_BUILD
          path: |
            NESKUCHNO_V15_DEBUG.apk
            NESKUCHNO_V15_RELEASE_UNSIGNED.apk
            APK_SHA256.txt
            source.tar.xz
            build.log
            debug-badging.txt
            debug-permissions.txt
            debug-signature.txt
            debug-zip-test.txt
            release-zip-test.txt
            emulator-console.log
            emulator-devices.txt
            emulator-install.txt
            emulator-start.txt
            emulator-restart.txt
            emulator-home.png
            emulator-feature.png
            emulator-home.xml
            emulator-feature.xml
            emulator-logcat.txt
            ANDROID_SIGNING_TOOLS_35.tar.gz
            CI_VERIFICATION.txt
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0
